<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMA Law Master Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; font-weight: bold; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .option-btn { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .sticky-header { backdrop-filter: blur(10px); background: rgba(30, 58, 138, 0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="sticky-header text-white p-4 sticky top-0 z-10 shadow-lg">
        <h1 class="text-lg font-bold text-center">Paper 5: Law & Ethics (MCQ Bank)</h1>
        <div class="flex justify-between items-center mt-3 px-2">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase opacity-70">Your Score</span>
                <span id="score" class="text-xl font-black">0</span>
            </div>
            <div class="text-right">
                <span id="progress-text" class="text-xs font-medium block mb-1">Attempted: 0/0</span>
                <div class="w-32 h-2 bg-blue-900 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-cyan-400 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 pb-24 max-w-2xl mx-auto w-full" id="quiz-container"></main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        // --- DATA SECTION: Humne pehle 15 sample questions yahan rakhe hain ---
        const mcqData = [
            { id: 1, q: "Right to Property is a:", options: ["Fundamental Right", "Fundamental Duty", "Constitutional Right", "None of the above"], ans: 3 },
            { id: 2, q: "The Constitution of India describes India as:", options: ["A federation", "Quasi-federal", "A Union of states", "None of the above"], ans: 3 },
            { id: 3, q: "Constitution is the:", options: ["Law of the land", "Administrative Law", "Constitutional Law", "None of the above"], ans: 1 },
            { id: 4, q: "Chief source of legal authority in India?", options: ["President", "Constitution", "Parliament", "None"], ans: 2 },
            { id: 5, q: "Soul of the Constitution?", options: ["Fundamental Rights", "Fundamental Duties", "Directive Principles", "Preamble"], ans: 4 },
            { id: 6, q: "Preamble is based on 'Objectives Resolution' moved by:", options: ["Dr. Ambedkar", "Pandit Nehru", "Sardar Patel", "Mahatma Gandhi"], ans: 2 },
            { id: 7, q: "The term 'We' in Preamble means:", options: ["Government", "Supreme Court", "Parliament", "The People of India"], ans: 4 },
            { id: 8, q: "Justice in Preamble includes:", options: ["Social", "Economic", "Political", "All of the above"], ans: 4 },
            { id: 9, q: "Preamble amended by which Act?", options: ["27th Amendment", "42nd Amendment", "44th Amendment", "None"], ans: 2 },
            { id: 10, q: "Case where SC said Preamble is NOT part of Constitution?", options: ["Berubari Union", "Kesavananda Bharati", "Both", "None"], ans: 1 },
            { id: 11, q: "Case where SC said Preamble IS integral part?", options: ["Berubari Union", "Kesavananda Bharati", "Both", "None"], ans: 2 },
            { id: 12, q: "Authority of Constitution comes from:", options: ["British Parliament", "Government of India", "The People of India", "Princely states"], ans: 3 },
            { id: 13, q: "Date of adoption of Constitution:", options: ["26th Jan 1950", "26th Nov 1949", "15th Aug 1947", "None"], ans: 2 },
            { id: 14, q: "Terms added by 42nd Amendment:", options: ["Socialist", "Secular", "Integrity", "All of these"], ans: 4 },
            { id: 15, q: "Part declaring India as Sovereign Socialist Secular Democratic Republic?", options: ["Fundamental Rights", "DPSP", "Preamble", "Fundamental Duties"], ans: 3 }
        ];

        let score = 0;
        let attempted = 0;

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            document.getElementById('progress-text').innerText = `Attempted: 0/${mcqData.length}`;

            mcqData.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6 transition-all";
                card.innerHTML = `
                    <p class="font-bold text-slate-800 mb-5 text-lg leading-snug">
                        <span class="text-blue-600 font-black mr-2">#${item.id}</span> ${item.q}
                    </p>
                    <div class="space-y-3">
                        ${item.options.map((opt, i) => `
                            <button onclick="checkAnswer(this, ${i+1}, ${item.ans})" 
                                    class="option-btn w-full text-left p-4 rounded-2xl bg-slate-50 active:scale-[0.98] text-[15px] font-medium border-slate-100">
                                <span class="inline-block w-6 h-6 text-center bg-white border rounded-full mr-2 text-xs leading-6 text-slate-400">${String.fromCharCode(65 + i)}</span>
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkAnswer(btn, selected, correct) {
            const parent = btn.parentElement;
            if (parent.dataset.attempted) return;
            
            parent.dataset.attempted = "true";
            attempted++;
            const buttons = parent.querySelectorAll('button');
            
            buttons[correct-1].classList.add('correct');
            buttons[correct-1].querySelector('span').classList.add('bg-green-500', 'text-white', 'border-transparent');
            
            if (selected === correct) {
                score += 2; // Assuming 2 marks each
            } else {
                btn.classList.add('wrong');
                btn.querySelector('span').classList.add('bg-red-500', 'text-white', 'border-transparent');
            }
            
            updateProgress();
        }

        function updateProgress() {
            document.getElementById('score').innerText = score;
            document.getElementById('progress-text').innerText = `Attempted: ${attempted}/${mcqData.length}`;
            const perc = (attempted / mcqData.length) * 100;
            document.getElementById('progress-bar').style.width = perc + "%";
        }

        renderQuestions();
    </script>
</body>
</html>
